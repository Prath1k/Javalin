<svg width="640" height="800" viewBox="0 0 640 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Orb Chase thumbnail">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071727"/>
      <stop offset="100%" stop-color="#02070f"/>
    </linearGradient>
    <radialGradient id="orb" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e3faff"/>
      <stop offset="45%" stop-color="#7be6ff"/>
      <stop offset="100%" stop-color="#0578b8"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="640" height="800" fill="url(#bg)"/>

  <circle cx="130" cy="170" r="90" fill="#0f3854" opacity="0.45"/>
  <circle cx="520" cy="640" r="120" fill="#0a314c" opacity="0.35"/>

  <g opacity="0.2" stroke="#5ec9ff" stroke-width="2">
    <line x1="0" y1="80" x2="640" y2="80"/>
    <line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="400" x2="640" y2="400"/>
    <line x1="0" y1="560" x2="640" y2="560"/>
    <line x1="0" y1="720" x2="640" y2="720"/>
    <line x1="80" y1="0" x2="80" y2="800"/>
    <line x1="240" y1="0" x2="240" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="560" y1="0" x2="560" y2="800"/>
  </g>

  <circle cx="330" cy="370" r="106" fill="url(#orb)" filter="url(#glow)"/>
  <circle cx="365" cy="330" r="24" fill="#ffffff" opacity="0.65"/>

  <text x="320" y="690" fill="#d5f6ff" font-family="Arial, sans-serif" font-size="72" font-weight="700" text-anchor="middle" letter-spacing="3">
    ORB CHASE
  </text>
  <text x="320" y="735" fill="#85bfd6" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" letter-spacing="1.5">
    REACTION SPRINT
  </text>
</svg>
